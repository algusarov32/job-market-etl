version: '3.8'

services:
  # ============================================
  # MINIO - S3-compatible storage
  # ============================================
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
        test: ["CMD-SHELL", "echo > /dev/tcp/localhost/9000 || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 5
    networks:
      - etl_network
    restart: unless-stopped

  # ============================================
  # CLICKHOUSE - OLAP database
  # Native port changed to 9002 to avoid conflict with MinIO on 9000
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.1.3.31
    container_name: clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_HOST_PORT:-9002}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-analytics}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-chadmin}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./scripts/ch_init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etl_network
    restart: unless-stopped

  # ============================================
  # POSTGRESQL - Airflow metadata store
  # ============================================
  postgres_airflow:
    image: postgres:16.1
    container_name: postgres_airflow
    ports:
      - "${AIRFLOW_POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${AIRFLOW_POSTGRES_USER:-afadmin}
      POSTGRES_PASSWORD: ${AIRFLOW_POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_POSTGRES_USER:-afadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - etl_network
    restart: unless-stopped

  # ============================================
  # AIRFLOW - init (runs once, exits)
  # ============================================
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-afadmin}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_UPGRADE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_ADMIN_USER:-afadmin}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
    command: version
    networks:
      - etl_network

  # ============================================
  # AIRFLOW - webserver
  # ============================================
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-afadmin}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      GP_HOST: "${GP_HOST}"
      GP_PORT: "${GP_PORT:-5432}"
      GP_DATABASE: "${GP_DATABASE:-postgres}"
      GP_USER: "${GP_USER:-gpadmin}"
      GP_PASSWORD: "${GP_PASSWORD:-gpadmin}"
      CLICKHOUSE_HOST: "${CLICKHOUSE_HOST:-clickhouse}"
      CLICKHOUSE_HTTP_PORT: "${CLICKHOUSE_HTTP_PORT:-8123}"
      CLICKHOUSE_NATIVE_PORT: "${CLICKHOUSE_NATIVE_PORT:-9000}"
      CLICKHOUSE_DATABASE: "${CLICKHOUSE_DATABASE:-facts}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-}"
      MINIO_ENDPOINT_URL: "${MINIO_ENDPOINT_URL:-http://minio:9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      THEIRSTACK_API_KEY: "${THEIRSTACK_API_KEY}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
    command: webserver
    healthcheck:
        test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
        interval: 30s
        timeout: 10s
        retries: 5
    networks:
      - etl_network
    restart: unless-stopped

  # ============================================
  # AIRFLOW - scheduler
  # ============================================
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    depends_on:
      postgres_airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${AIRFLOW_POSTGRES_USER:-afadmin}:${AIRFLOW_POSTGRES_PASSWORD:-airflow}@postgres_airflow:5432/${AIRFLOW_POSTGRES_DB:-airflow}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      GP_HOST: "${GP_HOST}"
      GP_PORT: "${GP_PORT:-5432}"
      GP_DATABASE: "${GP_DATABASE:-postgres}"
      GP_USER: "${GP_USER:-gpadmin}"
      GP_PASSWORD: "${GP_PASSWORD:-gpadmin}"
      CLICKHOUSE_HOST: "${CLICKHOUSE_HOST:-clickhouse}"
      CLICKHOUSE_HTTP_PORT: "${CLICKHOUSE_HTTP_PORT:-8123}"
      CLICKHOUSE_NATIVE_PORT: "${CLICKHOUSE_NATIVE_PORT:-9000}"
      CLICKHOUSE_DATABASE: "${CLICKHOUSE_DATABASE:-facts}"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-default}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-}"
      MINIO_ENDPOINT_URL: "${MINIO_ENDPOINT_URL:-http://minio:9000}"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      THEIRSTACK_API_KEY: "${THEIRSTACK_API_KEY}"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
    command: scheduler
    healthcheck:
        test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
        interval: 30s
        timeout: 10s
        retries: 5
    networks:
      - etl_network
    restart: unless-stopped

  # ============================================
  # GRAFANA - visualization
  # ============================================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-gadmin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana}
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - etl_network
    restart: unless-stopped

# ============================================
# VOLUMES
# ============================================
volumes:
  minio_data:
    driver: local
  clickhouse_data:
    driver: local
  postgres_airflow_data:
    driver: local
  grafana_data:
    driver: local

# ============================================
# NETWORKS
# ============================================
networks:
  etl_network:
    driver: bridge
